<!DOCTYPE html>
<html lang="cs" xmlns:th="http://www.thymeleaf.org">
<head>
  <link rel="stylesheet" href="css/styles.css">
  <meta charset="UTF-8">
  <title>Scheduler - Naplánujte si setkání</title>
</head>
<body>
<div th:insert="fragments/header :: header">...</div>
<h1>Seznam uživatelů</h1>
  <table>
    <thead>
    <tr>
      <td>ID</td>
      <td>Křestní jméno</td>
      <td>Příjmení</td>
      <td>E-mail</td>
      <td>Telefon</td>
    </tr>
    </thead>
    <tbody>
    <tr th:if="${message.empty}">
      <td colspan="4">Žádný záznam</td>
    </tr>
    <tr th:each="user: ${message}">
      <td th:text="${user.id}" />
      <td th:text="${user.firstName}" />
      <td th:text="${user.lastName}" />
      <td th:text="${user.email}" />
      <td th:text="${user.phone}" />
    </tr>
    </tbody>
  </table>
<div th:insert="fragments/footer :: footer">...</div>
</body>
</html>
