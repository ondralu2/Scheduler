<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Přidat událost</title>
</head>
<body>
<form action="/addEvent" method="POST">
    <h1>Vytvoření nové události</h1>

    <div>
        <label for="name">Název události:</label>
        <input name="name" id="name">
    </div>
    <div>
        <label for="description">Popis události:</label>
        <input name="description" id="description">
    </div>
    <div>
        <button>Přidat událost</button>
    </div>
</form>
</body>
</html>
