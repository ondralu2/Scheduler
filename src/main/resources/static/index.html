<!DOCTYPE html>
<html lang="cs">
<head>
    <link rel="stylesheet" href="styles.css">
    <meta charset="UTF-8">
    <title>Scheduler - Naplánujte si setkání</title>
</head>
<body>
    <a href="/">
        <img src="/img/logo.png" alt="clock">
    </a>
    <form action="/addUser" method="POST">
        <div class="divLeft">
            <a href="newEvent.html">Vytvořit novou událost</a>
        </div>
        <div class="divClear">
            <p>Let's add a customer.</p>

            <div>
                <label for="firstName">First name:</label>
                <input name="first" id="firstName" value="Lukáš">
            </div>
            <div>
                <label for="lastName">Last name:</label>
                <input name="last" id="lastName" value="Ondráček">
            </div>
            <div>
                <button>Add customer</button>
            </div>
        </div>
    </form>

    <form action="/list" method="GET">
        <button>List customers</button>
    </form>
</body>
</html>
